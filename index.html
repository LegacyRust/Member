<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LegacyRust Members</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css?v=livefix3" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">LEGACY RUST</p>
      <h1>参加者・運営一覧</h1>

      <div class="stats">
        <div class="stat">
          <span id="memberCount">0</span>
          <small>参加者</small>
        </div>
        <div class="stat">
          <span id="staffCount">0</span>
          <small>運営</small>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>運営</h2>
      </div>
      <div id="staffList" class="grid"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>参加者</h2>
      </div>
      <div id="memberList" class="grid"></div>
    </section>
  </main>

  <template id="cardTemplate">
    <article class="card">
      <div class="avatar-wrap">
        <span class="live-badge">LIVE</span>
        <img class="avatar" src="" alt="" loading="lazy" />
      </div>
      <div class="card-body">
        <h3 class="name"></h3>
        <div class="links"></div>
      </div>
    </article>
  </template>

  <script src="script.js?v=livefix3"></script>
</body>
</html>
