<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LegacyRust Members</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css?v=headerupgrade1" />
</head>
<body>
  <main class="page">

    <section class="hero">

      <div class="hero-top">
        <span class="mini-title">参加者リスト</span>
      </div>

      <div class="hero-center">
        <p class="eyebrow">STREAMER SERVER</p>

        <h1 class="main-title">
          LegacyRust
        </h1>

        <p class="hero-sub">
          参加者: <span id="memberCount">0</span>
          ／
          運営: <span id="staffCount">0</span>
        </p>
      </div>

    </section>

    <section class="section">
      <div class="section-head">
        <h2>運営</h2>
      </div>
      <div id="staffList" class="grid"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>参加者</h2>
      </div>
      <div id="memberList" class="grid"></div>
    </section>

  </main>

  <template id="cardTemplate">
    <article class="card">
      <div class="avatar-wrap">
        <img class="avatar" src="" alt="" loading="lazy" />
      </div>
      <div class="card-body">
        <h3 class="name"></h3>
        <div class="links"></div>
      </div>
    </article>
  </template>

  <script src="script.js?v=headerupgrade1"></script>
</body>
</html>
